name: Run ETL Pipeline

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  etl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: python -m pip install --upgrade pip pytest

      - name: Regenerate normalized job data
        run: python scripts/etl.py

      - name: Verify checked-in silver data is up to date
        run: git diff --exit-code -- data/silver/clean_jobs.json

      - name: Run tests
        run: pytest -q
